<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>心流工作區</title>
    
    <!-- Firebase CDN -->
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-auth-compat.js"></script>

    <style>
        :root {
            --primary-color: #007bff;
            --success-color: #28a745;
            --warning-color: #ffc107;
            --danger-color: #dc3545;
            --dark-color: #343a40;
            --light-bg: #f8f9fa;
            --border-color: #ced4da;
        }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif; background: #f0f2f5; margin: 0; padding: 20px; }
        
        /* 登入畫面 */
        #login-screen { position: fixed; inset: 0; background: radial-gradient(circle at center, #343a40 0%, #1a1e21 100%); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 10000; color: white; }
        .login-btn { background: var(--primary-color); color: white; border: none; padding: 12px 24px; border-radius: 8px; font-weight: bold; font-size: 1.1rem; cursor: pointer; transition: 0.2s; }
        .login-btn:hover { background: #0056b3; }

        .container { max-width: 1400px; margin: 0 auto; background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); border-top: 5px solid var(--danger-color); display: none; flex-direction: column; }
        h1, h2, h3 { margin-top: 0; color: var(--dark-color); }
        
        /* Layout */
        .main-layout { display: flex; gap: 20px; flex-wrap: wrap; align-items: stretch; }
        .left-panel { flex: 1; min-width: 320px; max-width: 450px; border: 2px solid var(--primary-color); border-radius: 8px; padding: 15px; background: #fff; display: flex; flex-direction: column; }
        .right-panel { flex: 2; min-width: 300px; display: flex; flex-direction: column; background: #fff; border: 1px solid var(--border-color); border-radius: 8px; padding: 15px;}
        
        /* Timer Styles */
        .timer-display { font-size: 3.5rem; font-weight: bold; text-align: center; margin: 10px 0; color: var(--dark-color); border: 1px solid #ddd; border-radius: 8px; padding: 10px; background: #f8f9fa; }
        .gif-container { width: 120px; height: 120px; margin: 0 auto; display: flex; align-items: center; justify-content: center; border: 2px dashed #ccc; border-radius: 8px; overflow: hidden; background: white; }
        .gif-container img { width: 100%; height: 100%; object-fit: cover; }
        .controls { display: flex; justify-content: space-between; gap: 5px; margin-top: 10px; }
        button { cursor: pointer; padding: 8px 12px; border: none; border-radius: 5px; font-weight: bold; color: white; transition: 0.2s; font-size: 0.9rem;}
        button:hover { opacity: 0.9; }
        .btn-success { background: var(--success-color); }
        .btn-warning { background: var(--warning-color); color: #333; }
        .btn-danger { background: var(--danger-color); }
        .btn-primary { background: var(--primary-color); }
        .btn-info { background: #17a2b8; }
        .btn-secondary { background: #6c757d; }
        .btn-outline { background: transparent; border: 1px solid var(--border-color); color: var(--dark-color); padding: 5px 8px; font-size: 0.85rem;}
        .btn-outline:hover { background: var(--light-bg); }
        .btn-md-tool { background: #e9ecef; border: 1px solid #ced4da; color: #495057; font-family: monospace; padding: 4px 8px;}
        .btn-md-tool:hover { background: #dee2e6; }
        
        /* Tabs */
        .tabs { display: flex; gap: 5px; margin-bottom: 10px; justify-content: center; }
        .tab-btn { background: #e9ecef; color: #495057; flex: 1; padding: 10px; }
        .tab-btn.active { background: #17a2b8; color: white; }

        /* Inputs */
        input[type="text"], input[type="date"], select, textarea { width: 100%; padding: 10px; margin: 5px 0; border: 1px solid #ced4da; border-radius: 6px; box-sizing: border-box; font-size: 0.95rem; }
        textarea { flex: 1; min-height: 350px; font-family: 'Courier New', Courier, monospace; resize: vertical; background: #fdfdfd; line-height: 1.6; font-size: 1rem; border: 2px solid #e9ecef;}
        textarea:focus { outline: none; border-color: var(--info-color, #17a2b8); box-shadow: 0 0 0 3px rgba(23, 162, 184, 0.1); }

        /* Todo List */
        .todo-item { display: flex; align-items: flex-start; background: #fff; border-bottom: 1px solid #eee; padding: 12px 8px; transition: 0.2s; position: relative;}
        .todo-item:hover { background: #f8f9fa; }
        .todo-item.priority-P1 { border-left: 4px solid var(--danger-color); background: #fff3cd; }
        .todo-item.priority-P2 { border-left: 4px solid var(--warning-color); background: #f8d7da; }
        .todo-item.completed { opacity: 0.6; text-decoration: line-through; background: #e9ecef; border-left: 4px solid #adb5bd; }
        .todo-item.active-task { background: #e0f7fa; border-left: 4px solid #00bcd4; }
        
        .todo-details { flex-grow: 1; margin-left: 5px; overflow: hidden;}
        .badge { padding: 3px 6px; border-radius: 4px; font-size: 0.75em; color: white; }
        .badge-source { background: #6f42c1; font-size: 0.7em; margin-left: 5px; }
        .todo-actions { display: flex; flex-direction: column; gap: 5px; margin-left: 5px;}
        
        /* Note Panel Specifics */
        .note-header { display: flex; justify-content: space-between; align-items: flex-start; padding-bottom: 10px; border-bottom: 2px solid var(--light-bg); margin-bottom: 10px; }
        .template-bar { display: flex; gap: 8px; margin-bottom: 10px; flex-wrap: wrap; background: var(--light-bg); padding: 8px; border-radius: 6px; align-items: center;}
        .log-input-group { display: flex; gap: 8px; margin-top: 10px; }
        .log-input-group input { margin: 0; border: 2px solid var(--success-color); }
        
        /* Countdown */
        .countdown-box { margin-top: 15px; padding: 10px; background: var(--danger-color); color: white; text-align: center; border-radius: 5px; font-weight: bold; }

        /* Footer */
        .app-footer { margin-top: 30px; border-top: 1px solid #eee; padding-top: 15px; display: flex; justify-content: space-between; align-items: center; font-size: 0.85rem; color: #666; }

        @media (max-width: 768px) {
            .main-layout { flex-direction: column; }
            .timer-display { font-size: 2.5rem; }
            textarea { height: 250px; }
            .app-footer { flex-direction: column; gap: 10px; }
            .header-buttons { flex-direction: column; width: 100%; }
        }
    </style>
</head>
<body>

<!-- 登入畫面 -->
<div id="login-screen">
    <h1 style="font-size: 2.5rem; margin-bottom: 10px;">🌟 心流工作區</h1>
    <p style="color: #adb5bd; margin-bottom: 30px;">戰術執行沙盒</p>
    <button class="login-btn" onclick="loginFirebase()">與白板帳號同步登入</button>
</div>

<!-- 應用程式本體 -->
<div class="container" id="app-container">
    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom: 15px; border-bottom: 2px solid #f0f2f5; padding-bottom: 15px; flex-wrap: wrap; gap: 10px;">
        <h1 style="margin: 0; white-space: nowrap;">🌟 心流沙盒</h1>
        <div class="header-buttons" style="display: flex; gap: 8px; flex-wrap: wrap;">
            <button class="btn-info" onclick="importFromWhiteboard()" style="background: #6f42c1;">📥 載入白板資料</button>
            <button class="btn-success" onclick="packageForWhiteboard()">📦 複製報告</button>
            <button class="btn-primary" onclick="downloadMarkdown()" style="background: #0056b3;">⬇️ 下載 .md</button>
            <button class="btn-secondary" onclick="window.location.href='index.html'">🔙 回白板</button>
        </div>
    </div>

    <div class="main-layout">
        <!-- 左側：控制面板 (計時器 / 任務清單) -->
        <div class="left-panel">
            <div class="tabs">
                <button class="tab-btn active" onclick="switchLeftPanel('TIMER')" id="tab-timer">⏱️ 計時器</button>
                <button class="tab-btn" onclick="switchLeftPanel('TODO')" id="tab-todo">📋 任務矩陣</button>
            </div>

            <!-- 計時器 View -->
            <div id="view-timer">
                <div class="tabs" style="margin-bottom: 15px;">
                    <button class="tab-btn active" onclick="setTimerMode('FLEXIBLE')" id="btn-mode-flex">彈性計時</button>
                    <button class="tab-btn" onclick="setTimerMode('POMODORO')" id="btn-mode-pomo">番茄時鐘</button>
                </div>
                
                <div class="timer-display" id="timeDisplay">00:00:00</div>
                <div class="gif-container" id="gifContainer">
                    <span style="color:#ccc">GIF (停止)</span>
                </div>
                <div style="text-align:center; margin: 10px 0; font-weight:bold; color:#6c757d;" id="statusText">狀態: 閒置</div>
                
                <div class="controls">
                    <button class="btn-success" onclick="startTimer()">▶ 啟動</button>
                    <button class="btn-warning" onclick="pauseTimer()">⏸ 暫停</button>
                    <button class="btn-primary" onclick="stopTimer()">⏹ 停止</button>
                </div>

                <hr style="border:0; border-top:1px dashed #ced4da; margin: 20px 0;">
                <h4 style="margin:5px 0; color:var(--danger-color);">🎯 死線倒數</h4>
                <input type="text" id="deadlineTask" placeholder="專案名稱" oninput="updateCountdown()">
                <input type="date" id="deadlineDate" onchange="updateCountdown()">
                <div id="countdownDisplay" class="countdown-box" style="display:none;"></div>
            </div>

            <!-- 任務清單 View -->
            <div id="view-todo" style="display:none; flex-grow: 1; flex-direction: column;">
                <!-- 快速新增區 -->
                <div style="background: var(--light-bg); padding: 10px; border-radius: 6px; margin-bottom: 10px; border: 1px solid #dee2e6;">
                    <div style="display:flex; gap:5px;">
                        <input type="text" id="newTodoTask" placeholder="快速新增任務 (Enter)" style="flex:1" onkeypress="if(event.key === 'Enter') addTodo()">
                        <select id="newTodoPriority" style="width: 80px;">
                            <option value="P1">P1</option>
                            <option value="P2">P2</option>
                            <option value="P3" selected>P3</option>
                        </select>
                        <button class="btn-primary" onclick="addTodo()">➕</button>
                    </div>
                </div>

                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; padding: 0 5px;">
                    <button class="btn-outline" style="font-size: 0.8rem; padding: 4px 8px;" onclick="mergeSelectedTasks()">🔗 合併選中任務</button>
                    <button class="btn-secondary" style="font-size: 0.8rem; padding: 4px 8px;" onclick="clearCompletedTodos()">清除已完成</button>
                </div>
                
                <div id="todoListContainer" style="flex-grow: 1; max-height: 500px; overflow-y: auto; border-top: 1px solid #dee2e6;">
                    <!-- Todos 會生成在這裡 -->
                </div>
            </div>
        </div>

        <!-- 右側：動態筆記焦點區 -->
        <div class="right-panel">
            <div class="note-header">
                <div style="flex: 1;">
                    <span style="font-size: 0.85rem; color: #6c757d; font-weight: bold;">當前焦點任務 (Context)</span>
                    <h2 id="activeTaskTitle" style="margin: 5px 0 0 0; color: var(--primary-color);">全域沙盒草稿 (未選擇任務)</h2>
                </div>
                <div style="text-align: right;">
                    <span style="font-size:0.8rem; color:#adb5bd; display:block; margin-bottom: 8px;" id="saveStatus">已自動儲存</span>
                    <button id="btn-split-task" class="btn-warning" style="display:none; font-size: 0.85rem; padding: 5px 10px;" onclick="splitActiveTask()">✂️ 依分隔線(---)拆解</button>
                </div>
            </div>

            <div class="template-bar">
                <span style="font-size: 0.85rem; color: #666;">⚡ 模板：</span>
                <button class="btn-outline" onclick="insertTemplate('bug')">🐛 Bug</button>
                <button class="btn-outline" onclick="insertTemplate('dissect')">🔍 拆解</button>
                <button class="btn-outline" onclick="insertTemplate('review')">📝 覆盤</button>
                <button class="btn-outline" onclick="insertTemplate('divider')">✂️ ---</button>
                
                <span style="color: #ccc; margin: 0 5px;">|</span>
                <span style="font-size: 0.85rem; color: #666;">MD：</span>
                <button class="btn-md-tool" onclick="wrapMarkdown('**', '**')" title="粗體"><b>B</b></button>
                <button class="btn-md-tool" onclick="wrapMarkdown('*', '*')" title="斜體"><i>I</i></button>
                <button class="btn-md-tool" onclick="wrapMarkdown('`', '`')" title="程式碼">`code`</button>
                <button class="btn-md-tool" onclick="insertPrefix('- ')" title="清單清單">• List</button>
            </div>

            <!-- 筆記區 (綁定焦點任務) -->
            <textarea id="activeNoteArea" placeholder="選擇左側任務並點擊「📝聚焦」，或直接在此處記錄全域靈感...&#10;&#10;支援 Markdown 語法輸入 (按 Tab 鍵可縮排)！&#10;想切分任務時，請在內容中使用「---」分隔線，並點擊右上角「拆解」。" oninput="saveActiveNote()"></textarea>

            <div class="log-input-group">
                <button class="btn-success" style="pointer-events: none;">閃念</button>
                <input type="text" id="quickLogInput" placeholder="輸入短語或進度，按 Enter 自動打上時間戳並寫入筆記..." onkeypress="if(event.key === 'Enter') addQuickLog()">
            </div>
        </div>
    </div>

    <div class="app-footer">
        <div>
            <span>🔐 任務變更與筆記僅限此沙盒，不污染白板資料。結算可選擇「複製報告」或「下載 .md」。</span>
        </div>
        <button class="btn-danger" style="font-size: 0.85rem; padding: 8px 15px;" onclick="clearFlowSandbox()">🧹 徹底清空心流沙盒</button>
    </div>
</div>

<script>
    // --- Firebase 配置 ---
    const firebaseConfig = {
        apiKey: "AIzaSyAIY9PU-bDLktkTpLSmFKRe1uepvWCKEiU",
        authDomain: "maplestoryboss.firebaseapp.com",
        projectId: "maplestoryboss",
        storageBucket: "maplestoryboss.firebasestorage.app",
        messagingSenderId: "198034430854",
        appId: "1:198034430854:web:527ffcee039e223b972a07"
    };
    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const provider = new firebase.auth.GoogleAuthProvider();

    // --- Configuration ---
    const GIF_URL = "https://media.giphy.com/media/JIX9t2j0ZTN9S/giphy.gif";
    let currentUser = null;
    let LOCAL_STORAGE_KEY = 'flow_workspace_data';
    
    // --- State ---
    let state = {
        mode: 'FLEXIBLE', 
        timerStatus: 'IDLE', 
        seconds: 0,
        pomoPhase: 'FOCUS', 
        pomoCount: 0,
        timerInterval: null,
        todos: [],
        globalNote: "", 
        activeTaskId: null, 
        lastSave: Date.now()
    };

    // --- Auth & Init ---
    auth.onAuthStateChanged((user) => {
        if (user) {
            currentUser = user;
            LOCAL_STORAGE_KEY = `flow_workspace_data_${user.uid}`;
            document.getElementById('login-screen').style.display = 'none';
            document.getElementById('app-container').style.display = 'flex';
            initApp();
        } else {
            currentUser = null;
            document.getElementById('login-screen').style.display = 'flex';
            document.getElementById('app-container').style.display = 'none';
        }
    });

    function loginFirebase() {
        auth.signInWithPopup(provider).catch(err => alert("登入失敗: " + err.message));
    }

    function initApp() {
        loadData();
        renderTodo();
        updateCountdown();
        updateDisplay();
        refreshActiveNoteUI();
        switchLeftPanel('TODO'); 
        setupTextareaTabKey();
    }

    // --- 攔截 Tab 鍵輸入縮排 ---
    function setupTextareaTabKey() {
        const textarea = document.getElementById('activeNoteArea');
        textarea.addEventListener('keydown', function(e) {
            if (e.key === 'Tab') {
                e.preventDefault(); 
                const start = this.selectionStart;
                const end = this.selectionEnd;
                this.value = this.value.substring(0, start) + "    " + this.value.substring(end);
                this.selectionStart = this.selectionEnd = start + 4;
                saveActiveNote();
            }
        });
    }

    // --- Markdown 編輯輔助 ---
    function wrapMarkdown(prefix, suffix) {
        const noteArea = document.getElementById('activeNoteArea');
        const start = noteArea.selectionStart;
        const end = noteArea.selectionEnd;
        const selectedText = noteArea.value.substring(start, end);
        
        noteArea.value = noteArea.value.substring(0, start) + prefix + selectedText + suffix + noteArea.value.substring(end);
        
        noteArea.focus();
        if (selectedText.length === 0) {
            noteArea.selectionStart = noteArea.selectionEnd = start + prefix.length;
        } else {
            noteArea.selectionStart = noteArea.selectionEnd = start + prefix.length + selectedText.length + suffix.length;
        }
        saveActiveNote();
    }

    function insertPrefix(prefix) {
        const noteArea = document.getElementById('activeNoteArea');
        const start = noteArea.selectionStart;
        noteArea.value = noteArea.value.substring(0, start) + prefix + noteArea.value.substring(start);
        noteArea.focus();
        noteArea.selectionStart = noteArea.selectionEnd = start + prefix.length;
        saveActiveNote();
    }

    // --- 自動綁定當前任務 ---
    function setActiveTask(id) {
        state.activeTaskId = id;
        refreshActiveNoteUI();
        renderTodo(); 
        saveData();
    }

    function refreshActiveNoteUI() {
        const titleEl = document.getElementById('activeTaskTitle');
        const noteArea = document.getElementById('activeNoteArea');
        const splitBtn = document.getElementById('btn-split-task');

        if (state.activeTaskId) {
            const task = state.todos.find(t => t.id === state.activeTaskId);
            if (task) {
                titleEl.innerText = `🎯 ${task.task}`;
                titleEl.style.color = 'var(--primary-color)';
                noteArea.value = task.content || "";
                splitBtn.style.display = 'inline-block';
                return;
            } else {
                state.activeTaskId = null;
            }
        }
        
        titleEl.innerText = "📝 全域沙盒草稿 (未綁定單一任務)";
        titleEl.style.color = 'var(--dark-color)';
        noteArea.value = state.globalNote || "";
        splitBtn.style.display = 'none'; 
    }

    function saveActiveNote() {
        const noteArea = document.getElementById('activeNoteArea');
        if (state.activeTaskId) {
            const task = state.todos.find(t => t.id === state.activeTaskId);
            if (task) task.content = noteArea.value;
        } else {
            state.globalNote = noteArea.value;
        }
        saveData();
    }

    // --- 快速模板注入 ---
    function insertTemplate(type) {
        const noteArea = document.getElementById('activeNoteArea');
        let template = "";
        
        switch(type) {
            case 'bug': template = "\n### 🐛 異常現象\n\n### 🔬 測試假設\n\n### 🛠️ 下一步\n"; break;
            case 'dissect': template = "\n### 🎯 現況與目標\n\n### 🚧 卡關點\n\n### 💡 解法構思\n1. \n2. \n"; break;
            case 'review': template = "\n### ✅ 已完成\n\n### ❌ 待優化\n\n### 📌 備註\n"; break;
            case 'divider': template = "\n---\n"; break;
        }

        const startPos = noteArea.selectionStart;
        const endPos = noteArea.selectionEnd;
        noteArea.value = noteArea.value.substring(0, startPos) + template + noteArea.value.substring(endPos, noteArea.value.length);
        
        noteArea.focus();
        noteArea.selectionStart = startPos + template.length;
        noteArea.selectionEnd = startPos + template.length;
        
        saveActiveNote();
    }

    // --- 閃念日誌 (時間軸) ---
    function addQuickLog() {
        const inputEl = document.getElementById('quickLogInput');
        const text = inputEl.value.trim();
        if (!text) return;

        const noteArea = document.getElementById('activeNoteArea');
        const now = new Date();
        const timeStr = `${now.getHours().toString().padStart(2, '0')}:${now.getMinutes().toString().padStart(2, '0')}`;
        
        noteArea.value += `\n**[${timeStr}]** ${text}`;
        inputEl.value = ''; 
        noteArea.scrollTop = noteArea.scrollHeight;
        
        saveActiveNote();
    }

    // --- 核心功能：任務合併 (修正並強化重組邏輯) ---
    function mergeSelectedTasks() {
        // [修正] 改為獲取 .todo-cb-merge
        const checkboxes = document.querySelectorAll('.todo-cb-merge:checked');
        if(checkboxes.length < 2) return alert("💡 請勾選至少兩個任務進行合併！");

        let mergedTitle = prompt("請輸入合併後的新任務名稱：", "合併任務集");
        if(mergedTitle === null) return; 
        if(mergedTitle.trim() === "") mergedTitle = "合併任務集";

        let mergedContent = "";
        let idsToDelete = [];
        let highestPriority = 'P3';

        checkboxes.forEach((cb, index) => {
            const id = parseFloat(cb.value);
            const task = state.todos.find(t => t.id === id);
            if(task) {
                idsToDelete.push(id);
                if(task.priority === 'P1') highestPriority = 'P1';
                else if(task.priority === 'P2' && highestPriority !== 'P1') highestPriority = 'P2';
                
                // [修正] 確保生成的字串結構完美匹配拆分工具的正則表達式
                let c = task.content ? task.content.trim() : "";
                mergedContent += `### 🧩 [原始來源] ${task.task}\n${c}\n`;
                if(index < checkboxes.length - 1) mergedContent += `\n---\n\n`;
            }
        });

        const newTask = {
            id: Date.now() + Math.random(),
            task: mergedTitle,
            content: mergedContent.trim(),
            priority: highestPriority,
            date: '', link: '', completed: false, source: '合併'
        };

        state.todos = state.todos.filter(t => !idsToDelete.includes(t.id));
        state.todos.unshift(newTask); 
        
        alert("✅ 任務已成功合併！筆記已自動串接。");
        setActiveTask(newTask.id); 
    }

    // --- 核心功能：任務拆解 (完美對應合併結果) ---
    function splitActiveTask() {
        if (!state.activeTaskId) return alert("請先選擇一個焦點任務！");
        
        const noteArea = document.getElementById('activeNoteArea');
        const content = noteArea.value.trim();
        
        if (!content.includes('---')) {
            return alert("✂️ 找不到分隔線！\n請在筆記中輸入 `---` 來標示您想分割的斷點。");
        }

        if(!confirm("確定要將此任務依據分隔線 (---) 拆分成多個獨立任務嗎？\n(原本的大任務將會被移除)")) return;

        const parts = content.split(/(?:^|\n)\s*---\s*(?:\n|$)/);
        
        if (parts.length <= 1) {
             return alert("無法正確辨識分隔線，請確保 `---` 獨立成行且前後有換行！");
        }

        const originalTask = state.todos.find(t => t.id === state.activeTaskId);
        let newTasks = [];

        parts.forEach((part, index) => {
            let chunk = part.trim();
            if (!chunk) return;

            let title = `${originalTask.task} (拆解 ${index + 1})`;
            let finalContent = chunk;

            // 若符合合併時打上的原始來源標籤，則完美還原
            const match = chunk.match(/^### 🧩 \[原始來源\] (.*)(?:\n|$)/);
            if (match) {
                title = match[1].trim();
                finalContent = chunk.substring(match[0].length).trim(); 
            } else {
                const firstLine = chunk.split('\n')[0].replace(/^#+\s*/, '').trim();
                if(firstLine && firstLine.length < 30) {
                    title = firstLine;
                }
            }

            newTasks.push({
                id: Date.now() + Math.random() + index, 
                task: title,
                content: finalContent,
                priority: originalTask.priority,
                date: originalTask.date,
                link: originalTask.link,
                completed: false,
                source: '分割'
            });
        });

        state.todos = state.todos.filter(t => t.id !== state.activeTaskId);
        state.todos.unshift(...newTasks);

        setActiveTask(null);
        alert(`✂️ 已成功將該任務拆解成 ${newTasks.length} 個獨立任務！`);
    }

    // --- 產生 Markdown 報告文字 ---
    function generateReportMarkdown() {
        const completedTodos = state.todos.filter(t => t.completed);
        const pendingTodos = state.todos.filter(t => !t.completed);
        
        let exportText = `# 心流沙盒結算報告\n*產生時間: ${new Date().toLocaleString('zh-TW')}*\n\n`;
        let hasContent = false;

        // 全域筆記
        if(state.globalNote.trim()) {
            exportText += `## 📝 全域草稿與靈感\n\n${state.globalNote.trim()}\n\n---\n\n`;
            hasContent = true;
        }

        const formatTaskMD = (t, isDone) => {
            let badge = t.source === '臨時' ? '(臨時) ' : (t.source === '合併' ? '(合併) ' : (t.source === '分割' ? '(分割) ' : ''));
            let checkbox = isDone ? '- [x]' : '- [ ]';
            let str = `${checkbox} **${badge}${t.task}**\n`;
            if(t.content && t.content.trim()) {
                str += `\n> ${t.content.trim().replace(/\n/g, '\n> ')}\n\n`;
            }
            return str;
        };

        if(completedTodos.length > 0) {
            exportText += `## 🎯 今日完成任務\n\n`;
            completedTodos.forEach(t => { exportText += formatTaskMD(t, true); });
            hasContent = true;
        }

        if(pendingTodos.length > 0) {
            exportText += `## ⏳ 待續 / 未完成任務\n\n`;
            pendingTodos.forEach(t => { exportText += formatTaskMD(t, false); });
            hasContent = true;
        }
        
        return hasContent ? exportText : null;
    }

    // --- 打包與匯出 ---
    function packageForWhiteboard() {
        const exportText = generateReportMarkdown();
        if(!exportText) return alert("目前沙盒內沒有任何任務或筆記可以打包！");

        navigator.clipboard.writeText(exportText).then(() => {
            alert("📦 結算報告 (Markdown格式) 已複製到剪貼簿！\n\n你可以直接貼回白板母體、Notion 或任何支援 MD 的軟體。");
        }).catch(err => {
            alert("複製失敗，請手動複製右側筆記內容。");
        });
    }

    function downloadMarkdown() {
        const exportText = generateReportMarkdown();
        if(!exportText) return alert("目前沙盒內沒有任何任務或筆記可以下載！");

        const blob = new Blob([exportText], { type: 'text/markdown;charset=utf-8' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        
        const dateStr = new Date().toISOString().split('T')[0];
        a.download = `心流報告_${dateStr}.md`;
        
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        URL.revokeObjectURL(url);
    }

    function clearFlowSandbox() {
        if(confirm("⚠️ 警告：這將會徹底刪除沙盒內的所有臨時任務、草稿筆記與計時紀錄。\n\n您確定要清空嗎？")) {
            localStorage.removeItem(LOCAL_STORAGE_KEY);
            alert("🧹 沙盒已清空！頁面即將重新載入。");
            location.reload();
        }
    }

    function clearCompletedTodos() {
        state.todos = state.todos.filter(t => !t.completed);
        if(state.activeTaskId && !state.todos.find(t=>t.id===state.activeTaskId)) {
            setActiveTask(null);
        }
        saveData(); renderTodo();
    }

    // --- Todo 操作 ---
    function importFromWhiteboard() {
        if (!currentUser) return alert("無法獲取使用者資訊！");
        const wbDataRaw = localStorage.getItem(`whiteboard_state_${currentUser.uid}`);
        if (!wbDataRaw) return alert("⚠️ 找不到白板資料！");

        const wbData = JSON.parse(wbDataRaw);
        let importedCount = 0;

        if (wbData.workspaces) {
            Object.values(wbData.workspaces).forEach(tabCards => {
                tabCards.forEach(card => {
                    if (state.todos.some(t => t.wbId === card.id)) return; 
                    state.todos.push({
                        id: Date.now() + Math.random(), wbId: card.id,                  
                        task: card.title || '未命名白板卡片', content: card.content || '', 
                        priority: (card.status === 3 || card.color === 'red') ? 'P1' : 'P2', 
                        date: card.dateSingle || card.dateStart || '', link: '', completed: false, source: '卡片'
                    });
                    importedCount++;
                });
            });
        }

        if (wbData.nodes) {
            Object.values(wbData.nodes).forEach(tabNodes => {
                tabNodes.forEach(node => {
                    if (state.todos.some(t => t.wbId === node.id)) return;
                    let prio = 'P3'; if(node.tag === 'q1') prio = 'P1'; else if(node.tag === 'q2' || node.tag === 'q3') prio = 'P2';
                    state.todos.push({
                        id: Date.now() + Math.random(), wbId: node.id, task: node.text, content: '',  
                        priority: prio, date: '', link: '', completed: false, source: '發想'
                    });
                    importedCount++;
                });
            });
        }

        if (importedCount > 0) {
            alert(`✅ 成功匯入 ${importedCount} 筆白板任務！`);
            saveData(); renderTodo(); switchLeftPanel('TODO');
        } else { alert(`👌 沒有發現新的白板任務需要匯入。`); }
    }

    function addTodo() {
        const taskInput = document.getElementById('newTodoTask');
        const task = taskInput.value;
        if (!task) return alert("請輸入任務名稱");
        
        const item = {
            id: Date.now() + Math.random(),
            task: task, content: '', 
            priority: document.getElementById('newTodoPriority').value,
            date: '', link: '', completed: false, source: '臨時' 
        };
        
        state.todos.unshift(item);
        taskInput.value = '';
        renderTodo(); saveData(); setActiveTask(item.id);
    }

    function toggleTodo(id) {
        const item = state.todos.find(t => t.id === id);
        if (item) item.completed = !item.completed;
        renderTodo(); saveData();
    }

    function deleteTodo(id) {
        if(confirm("確定刪除此任務? (關聯的筆記也會遺失喔！)")) {
            state.todos = state.todos.filter(t => t.id !== id);
            if(state.activeTaskId === id) setActiveTask(null);
            renderTodo(); saveData();
        }
    }

    function renderTodo() {
        const container = document.getElementById('todoListContainer');
        container.innerHTML = "";
        
        const sorted = [...state.todos].sort((a,b) => {
            if(a.completed !== b.completed) return a.completed ? 1 : -1;
            if(a.priority !== b.priority) return a.priority.localeCompare(b.priority);
            return 0;
        });

        if (sorted.length === 0) {
            container.innerHTML = "<div style='text-align:center; color:#aaa; padding:20px; font-size: 0.9rem;'>目前無任務。<br>載入白板或上方快速新增！</div>";
            return;
        }

        sorted.forEach(item => {
            const div = document.createElement('div');
            const isActive = state.activeTaskId === item.id;
            div.className = `todo-item priority-${item.priority} ${item.completed ? 'completed' : ''} ${isActive ? 'active-task' : ''}`;
            
            let color = item.priority === 'P1' ? '#dc3545' : (item.priority === 'P2' ? '#ffc107' : '#007bff');
            let sourceBadge = '';
            if(item.source === '卡片') sourceBadge = `<span class="badge badge-source">白板</span>`;
            else if(item.source === '發想') sourceBadge = `<span class="badge badge-source" style="background:#e83e8c;">發想</span>`;
            else if(item.source === '合併') sourceBadge = `<span class="badge badge-source" style="background:#28a745;">合併</span>`;
            else if(item.source === '分割') sourceBadge = `<span class="badge badge-source" style="background:#fd7e14;">✂️ 分割</span>`;

            let noteIndicator = (item.content && item.content.trim().length > 0) ? `<span style="font-size:0.8rem; color:#17a2b8;">📝(有筆記)</span>` : '';

            // [修正] 視覺上把「合併勾選框」跟「完成勾選框」分離並美化
            div.innerHTML = `
                <div style="display: flex; flex-direction: column; align-items: center; justify-content: center; margin-right: 8px; min-width: 32px; border-right: 1px solid #eee; padding-right: 6px;">
                    <span style="font-size: 0.65rem; color: #adb5bd; margin-bottom: 2px;">合併</span>
                    <input type="checkbox" class="todo-cb-merge" value="${item.id}" title="勾選以合併任務" style="cursor: pointer; transform: scale(1.1);">
                </div>
                
                <div style="display: flex; align-items: center; margin-right: 8px; padding-top: 6px;">
                    <input type="checkbox" title="標示為完成" style="transform: scale(1.3); cursor: pointer;" ${item.completed ? 'checked' : ''} onchange="toggleTodo(${item.id})">
                </div>

                <div class="todo-details">
                    <div style="margin-bottom: 2px;">
                        <span class="badge" style="background:${color}">${item.priority}</span>
                        ${sourceBadge} ${noteIndicator}
                    </div>
                    <div style="font-size: 0.95rem; margin-top: 4px; font-weight: bold; color: ${isActive ? '#0056b3' : '#333'};">
                        ${item.task}
                    </div>
                </div>
                
                <div class="todo-actions">
                    <button class="${isActive ? 'btn-info' : 'btn-outline'}" style="padding:4px 8px; font-size:0.8rem;" onclick="setActiveTask(${item.id})">
                        ${isActive ? '🎯 焦點中' : '📝 聚焦'}
                    </button>
                    <button class="btn-danger" style="padding:2px 8px; background:transparent; color:#dc3545; font-size:1rem; border:none;" onclick="deleteTodo(${item.id})">×</button>
                </div>
            `;
            container.appendChild(div);
        });
    }

    // --- Panel & Timer Logic ---
    function switchLeftPanel(panel) {
        document.getElementById('view-timer').style.display = panel === 'TIMER' ? 'block' : 'none';
        document.getElementById('view-todo').style.display = panel === 'TODO' ? 'flex' : 'none';
        document.getElementById('tab-timer').className = panel === 'TIMER' ? 'tab-btn active' : 'tab-btn';
        document.getElementById('tab-todo').className = panel === 'TODO' ? 'tab-btn active' : 'tab-btn';
    }

    function setTimerMode(mode) {
        stopTimer(); state.mode = mode;
        document.getElementById('btn-mode-flex').className = mode === 'FLEXIBLE' ? 'tab-btn active' : 'tab-btn';
        document.getElementById('btn-mode-pomo').className = mode === 'POMODORO' ? 'tab-btn active' : 'tab-btn';
        if(mode === 'POMODORO') { state.seconds = 25 * 60; state.pomoPhase = 'FOCUS'; } else { state.seconds = 0; }
        updateDisplay(); saveData();
    }

    function startTimer() {
        if (state.timerStatus === 'RUNNING') return;
        state.timerStatus = 'RUNNING';
        state.timerInterval = setInterval(() => {
            if (state.mode === 'FLEXIBLE') state.seconds++;
            else { state.seconds--; if (state.seconds <= 0) handlePomoFinish(); }
            updateDisplay(); if(state.seconds % 30 === 0) saveData(); 
        }, 1000);
        updateDisplay();
    }

    function pauseTimer() { if (state.timerStatus !== 'RUNNING') return; clearInterval(state.timerInterval); state.timerStatus = 'PAUSED'; updateDisplay(); saveData(); }
    function stopTimer() { clearInterval(state.timerInterval); state.timerStatus = 'IDLE'; setTimerMode(state.mode); }
    function handlePomoFinish() { /* 簡化展示 */ }
    
    function formatTime(sec) {
        let h = Math.floor(sec / 3600), m = Math.floor((sec % 3600) / 60), s = sec % 60;
        return (h>0 ? `${h.toString().padStart(2,'0')}:` : '') + `${m.toString().padStart(2,'0')}:${s.toString().padStart(2,'0')}`;
    }

    function updateDisplay() {
        const display = document.getElementById('timeDisplay');
        const gifBox = document.getElementById('gifContainer');
        display.innerText = formatTime(state.seconds);
        if (state.timerStatus === 'RUNNING') {
            display.style.color = state.mode === 'POMODORO' && state.pomoPhase !== 'FOCUS' ? '#17a2b8' : '#28a745';
            gifBox.innerHTML = `<img src="${GIF_URL}">`;
            document.getElementById('statusText').innerText = state.mode === 'FLEXIBLE' ? "工作中" : `番茄 (${state.pomoPhase})`;
        } else if (state.timerStatus === 'PAUSED') {
            display.style.color = '#ffc107'; gifBox.innerHTML = `<span style="color:#aaa">暫停</span>`;
            document.getElementById('statusText').innerText = "暫停中";
        } else {
            display.style.color = '#343a40'; gifBox.innerHTML = `<span style="color:#ccc">停止</span>`;
            document.getElementById('statusText').innerText = "閒置";
        }
    }

    function updateCountdown() {
        const task = document.getElementById('deadlineTask').value, dateStr = document.getElementById('deadlineDate').value, box = document.getElementById('countdownDisplay');
        saveData(); 
        if (!dateStr) { box.style.display = 'none'; return; }
        const target = new Date(dateStr), today = new Date();
        today.setHours(0,0,0,0); target.setHours(0,0,0,0);
        const diffDays = Math.ceil((target - today) / (1000 * 60 * 60 * 24));
        box.style.display = 'block';
        if (diffDays > 0) { box.style.background = '#dc3545'; box.innerHTML = `🔥 ${task} 倒數：${diffDays} 天`; }
        else if (diffDays === 0) { box.style.background = '#ffc107'; box.style.color = '#333'; box.innerHTML = `🔥 ${task} 今天截止！`; }
        else { box.style.background = '#6c757d'; box.innerHTML = `🚨 ${task} 已過期 ${Math.abs(diffDays)} 天`; }
    }

    // --- Storage ---
    function saveData() {
        if(!currentUser) return;
        const data = {
            globalNote: state.globalNote, 
            todos: state.todos,
            activeTaskId: state.activeTaskId, 
            timerMode: state.mode,
            timerSeconds: state.seconds,
            deadlineTask: document.getElementById('deadlineTask').value,
            deadlineDate: document.getElementById('deadlineDate').value
        };
        localStorage.setItem(LOCAL_STORAGE_KEY, JSON.stringify(data));
        document.getElementById('saveStatus').innerText = "已儲存: " + new Date().toLocaleTimeString('zh-TW', {hour12:false});
    }

    function loadData() {
        if(!currentUser) return;
        const raw = localStorage.getItem(LOCAL_STORAGE_KEY);
        if (raw) {
            try {
                const data = JSON.parse(raw);
                state.globalNote = data.globalNote || data.notepad || ""; 
                state.todos = data.todos || [];
                state.activeTaskId = data.activeTaskId || null;
                
                if(data.timerMode) state.mode = data.timerMode;
                if(data.timerSeconds) state.seconds = data.timerSeconds;
                if(data.deadlineTask) document.getElementById('deadlineTask').value = data.deadlineTask;
                if(data.deadlineDate) document.getElementById('deadlineDate').value = data.deadlineDate;
                
                setTimerMode(state.mode);
            } catch(e) { console.error("資料讀取失敗", e); }
        }
    }
</script>
</body>
</html>
