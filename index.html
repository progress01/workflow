<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>個人高級數據分析中心 (Ops Hub Pro)</title>
    
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-auth-compat.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        :root { 
            --primary-color: #007bff; --success-color: #28a745; --warning-color: #ffc107; 
            --danger-color: #dc3545; --dark-color: #343a40; --light-bg: #f8f9fa; --border-color: #ced4da; 
        }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif; background: #f0f2f5; margin: 0; padding: 10px; color: #333; }
        
        #login-screen { position: fixed; inset: 0; background: radial-gradient(circle at center, #343a40 0%, #1a1e21 100%); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 10000; color: white; }
        .login-btn { background: var(--primary-color); color: white; border: none; padding: 12px 24px; border-radius: 8px; font-weight: bold; font-size: 1.1rem; cursor: pointer; transition: 0.2s; }
        
        .container { max-width: 1400px; margin: 0 auto; background: white; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); display: none; flex-direction: column; overflow: hidden; }
        .app-header { background: var(--dark-color); color: white; padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 10px; }
        .nav-tabs { display: flex; gap: 10px; }
        .nav-tab-btn { background: #495057; color: white; border: none; padding: 8px 16px; border-radius: 6px; cursor: pointer; font-weight: bold; }
        .nav-tab-btn.active { background: var(--primary-color); }

        .view-section { padding: 20px; display: none; }
        .view-section.active { display: block; }

        button { cursor: pointer; padding: 8px 15px; border: none; border-radius: 5px; font-weight: bold; color: white; transition: 0.2s; background: var(--primary-color); }
        button:hover { opacity: 0.9; }
        .btn-danger { background: var(--danger-color); }
        .btn-success { background: var(--success-color); }
        .btn-warning { background: var(--warning-color); color: #333; }
        .btn-secondary { background: #6c757d; }
        .btn-outline { background: transparent; border: 1px solid var(--border-color); color: var(--dark-color); }
        
        input[type="text"], input[type="number"], input[type="date"], select, textarea { padding: 8px; border: 1px solid #ced4da; border-radius: 6px; font-size: 0.9rem; box-sizing: border-box; }

        /* GA Controls */
        .ga-controls { background: white; padding: 15px; border-radius: 8px; margin-bottom: 20px; border: 1px solid var(--border-color); display: flex; flex-direction: column; gap: 12px; }
        .ga-row { display: flex; align-items: center; gap: 15px; flex-wrap: wrap; }
        .ga-label { font-weight: bold; color: #495057; min-width: 80px; }
        .btn-group { display: flex; gap: 5px; }
        .btn-filter { background: #e9ecef; color: #495057; border: 1px solid #ced4da; padding: 6px 12px; border-radius: 4px; cursor: pointer; font-weight: bold;}
        .btn-filter.active { background: #007bff; color: white; border-color: #007bff; }
        
        /* 本地設定面板 */
        .config-panel { background: #fff3cd; border: 1px solid #ffeeba; padding: 15px; border-radius: 8px; margin-bottom: 20px; display: none; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 15px; }

        /* KPI 卡片 */
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 15px; margin-bottom: 20px; }
        .stat-card { background: var(--light-bg); padding: 15px; border-radius: 8px; border: 1px solid var(--border-color); position: relative; }
        .stat-card h4 { margin: 0 0 5px 0; color: #6c757d; font-size: 0.85rem; }
        .stat-card .val { font-size: 1.6rem; font-weight: bold; color: var(--dark-color); }
        .stat-card .comparison { font-size: 0.75rem; font-weight: bold; margin-top: 5px; }
        .comp-up { color: var(--danger-color); }
        .comp-down { color: var(--success-color); }
        .comp-neutral { color: #6c757d; }

        .charts-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(350px, 1fr)); gap: 15px; margin-bottom: 20px; }
        .chart-container { background: white; padding: 15px; border-radius: 8px; border: 1px solid var(--border-color); height: 300px; position: relative; }
        
        .table-wrapper { max-height: 300px; overflow-y: auto; border: 1px solid var(--border-color); border-radius: 8px; }
        table { width: 100%; border-collapse: collapse; text-align: left; }
        th, td { padding: 10px; border-bottom: 1px solid #eee; font-size: 0.85rem; }
        th { background: var(--light-bg); position: sticky; top: 0; z-index: 10; }

        /* 沙盒佈局 */
        .sandbox-layout { display: flex; gap: 20px; align-items: stretch; }
        .panel-left { flex: 1; min-width: 280px; display: flex; flex-direction: column; gap: 15px; }
        .panel-right { flex: 2; min-width: 300px; display: flex; flex-direction: column; gap: 10px; }
        .timer-box { background: var(--light-bg); padding: 15px; border-radius: 8px; border: 1px solid var(--border-color); text-align: center; }
        .timer-display { font-size: 3rem; font-weight: bold; margin: 10px 0; }
        .task-list { flex-grow: 1; max-height: 400px; overflow-y: auto; border: 1px solid var(--border-color); border-radius: 8px; background: white; }
        .task-item { padding: 10px; border-bottom: 1px solid #eee; display: flex; justify-content: space-between; align-items: center; cursor: pointer; }
        .task-item.active { border-left: 4px solid var(--primary-color); background: #e9ecef; }
        .task-item.completed { opacity: 0.6; text-decoration: line-through; }
        textarea { flex-grow: 1; min-height: 300px; font-family: monospace; padding: 15px; }
        .sandbox-actions { display: flex; justify-content: space-between; align-items: center; background: #e9ecef; padding: 10px 15px; border-radius: 8px; margin-top: 10px; flex-wrap: wrap; gap: 10px; }

        @media (max-width: 768px) {
            .sandbox-layout { flex-direction: column; }
            .charts-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

<div id="login-screen">
    <h1 style="font-size: 2rem; margin-bottom: 10px;">🛡️ 個人運營中心 Pro</h1>
    <button class="login-btn" onclick="loginFirebase()">連結資料庫</button>
</div>

<div class="container" id="app-container">
    <div class="app-header">
        <div style="font-size: 1.2rem; font-weight: bold;">🛡️ Ops Hub Pro</div>
        <div class="nav-tabs">
            <button class="nav-tab-btn active" onclick="switchView('dashboard')" id="btn-tab-dashboard">📊 GA 數據高級儀表板</button>
            <button class="nav-tab-btn" onclick="switchView('sandbox')" id="btn-tab-sandbox">🌟 心流沙盒</button>
        </div>
        <button class="btn-outline" style="color:white; border-color:white; padding: 4px 10px;" onclick="toggleConfigPanel()">⚙️ 本地配置面板</button>
    </div>

    <div id="local-config" class="config-panel">
        <div>
            <label style="font-weight:bold; display:block; margin-bottom:5px;">💰 每月基本預算 (薪水基底)</label>
            <input type="number" id="cfg-salary" value="50000" onchange="saveLocalConfig()">
        </div>
        <div>
            <label style="font-weight:bold; display:block; margin-bottom:5px;">🔄 獨立加總月固定訂閱總額 (如 Netflix/軟體)</label>
            <input type="number" id="cfg-subscriptions" value="1500" onchange="saveLocalConfig()">
        </div>
        <div style="display:flex; align-items:flex-end;">
            <span style="font-size:0.8rem; color:#856404;">ℹ️ 此處引數僅存於本地，用於精準計算【可用真實結餘】。</span>
        </div>
    </div>

    <div id="view-dashboard" class="view-section active">
        <div class="ga-controls">
            <div class="ga-row">
                <div class="ga-label">📅 分析區間</div>
                <div class="btn-group" id="date-btn-group">
                    <button class="btn-filter" onclick="setDateRange('7days', this)">近 7 天</button>
                    <button class="btn-filter" onclick="setDateRange('30days', this)">近 30 天</button>
                    <button class="btn-filter active" onclick="setDateRange('month', this)">本月</button>
                    <button class="btn-filter" onclick="setDateRange('custom', this)">自訂</button>
                </div>
                <div id="custom-dates" style="display: none; gap: 5px; align-items: center;">
                    <input type="date" id="custom-start"> <span>-</span> <input type="date" id="custom-end">
                </div>
            </div>
            <div class="ga-row">
                <div class="ga-label">👁️ 分析模式</div>
                <div class="btn-group" id="mode-btn-group">
                    <button class="btn-filter active" onclick="setAnalysisMode('trend', this)">📈 趨勢分佈與 Pacing 速率</button>
                    <button class="btn-filter" onclick="setAnalysisMode('structure', this)">📊 結構佔比與分類涵攝</button>
                </div>
                <button class="btn-success" style="margin-left: auto;" onclick="executeAnalysis()">🚀 執行全維度解析</button>
            </div>
        </div>

        <div class="stats-grid">
            <div class="stat-card">
                <h4>💸 區間開銷總計</h4>
                <div class="val" id="stat-expense" style="color:var(--danger-color);">0</div>
                <div class="comparison" id="cmp-expense">較上期 --</div>
            </div>
            <div class="stat-card">
                <h4>💰 區間外部收入</h4>
                <div class="val" id="stat-income" style="color:var(--success-color);">0</div>
                <div class="comparison" id="cmp-income">較上期 --</div>
            </div>
            <div class="stat-card">
                <h4>💳 可用預算真實結餘</h4>
                <div class="val" id="stat-balance" style="color:var(--primary-color);">0</div>
                <div class="comparison" id="cmp-balance" style="color:#6c757d;">包含本地薪水與訂閱攤提</div>
            </div>
            <div class="stat-card">
                <h4>📚 成長與習慣追蹤</h4>
                <div class="val" id="stat-growth" style="color: #17a2b8;">0</div>
                <div class="comparison" id="cmp-growth">較上期 --</div>
            </div>
        </div>

        <div class="charts-grid">
            <div class="chart-container"><canvas id="financeChart"></canvas></div>
            <div class="chart-container"><canvas id="healthChart"></canvas></div>
            <div class="chart-container"><canvas id="growthChart"></canvas></div>
        </div>

        <h4 style="margin: 0 0 10px 0; color: #495057;">📝 區間足跡快照明細</h4>
        <div class="table-wrapper">
            <table>
                <thead>
                    <tr><th>日期</th><th>類型</th><th>分類定義</th><th>數值</th><th>備註快照</th></tr>
                </thead>
                <tbody id="table-body"></tbody>
            </table>
        </div>
    </div>

    <div id="view-sandbox" class="view-section">
        <div class="sandbox-layout">
            <div class="panel-left">
                <div class="timer-box">
                    <div style="display: flex; justify-content: center; gap: 5px; margin-bottom: 10px;">
                        <button class="btn-secondary" style="flex:1; font-size: 0.8rem;" onclick="setTimerMode('FLEX')">彈性計時</button>
                        <button class="btn-danger" style="flex:1; font-size: 0.8rem;" onclick="setTimerMode('POMO')">番茄鐘(25m)</button>
                    </div>
                    <div class="timer-display" id="timeDisplay">00:00:00</div>
                    <div style="color: #6c757d; font-size: 0.85rem; margin-bottom: 10px;" id="timerStatus">閒置中</div>
                    <div style="display: flex; gap: 5px;">
                        <button class="btn-success" style="flex:1;" onclick="startTimer()">▶</button>
                        <button class="btn-warning" style="flex:1;" onclick="pauseTimer()">⏸</button>
                        <button class="btn-secondary" style="flex:1;" onclick="stopTimer()">⏹</button>
                    </div>
                </div>
                <div style="display: flex; justify-content: space-between; align-items: center;">
                    <h4 style="margin: 0; color: #495057;">📋 本地複本任務</h4>
                    <button class="btn-outline" style="padding: 4px 8px; font-size: 0.8rem;" onclick="importWhiteboardTasks()">📥 載入白板</button>
                </div>
                <div class="task-list" id="sandbox-task-list"></div>
            </div>
            <div class="panel-right">
                <div style="display: flex; justify-content: space-between; align-items: flex-end;">
                    <h4 style="margin: 0; color: #495057;">📝 密閉式發想沙盒 (Markdown)</h4>
                    <span style="font-size: 0.8rem; color: #adb5bd;" id="sandbox-save-status">自動儲存於本地</span>
                </div>
                <input type="text" id="sandbox-task-title" placeholder="全域發想草稿" readonly style="font-weight: bold; color: var(--primary-color); border: none; border-bottom: 1px dashed #ced4da; border-radius: 0;">
                <textarea id="sandbox-note-area" oninput="saveSandboxState()"></textarea>
            </div>
        </div>
        <div class="sandbox-actions">
            <div style="font-size: 0.85rem; color: #856404;"><strong>ℹ️ 物理隔離狀態：</strong> 所有的修改與筆記只會留在當前視窗，不污染資料庫。</div>
            <div style="display: flex; gap: 10px;">
                <button class="btn-success" onclick="exportSandboxMarkdown()">⬇️ 輸出成果 (.md)</button>
                <button class="btn-danger" onclick="clearSandbox()">🧹 徹底清空沙盒</button>
            </div>
        </div>
    </div>
</div>

<script>
    // ==========================================
    // 1. Firebase 初始化
    // ==========================================
    const firebaseConfig = { apiKey: "AIzaSyAIY9PU-bDLktkTpLSmFKRe1uepvWCKEiU", authDomain: "maplestoryboss.firebaseapp.com", projectId: "maplestoryboss", storageBucket: "maplestoryboss.firebasestorage.app", messagingSenderId: "198034430854", appId: "1:198034430854:web:527ffcee039e223b972a07" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();
    const auth = firebase.auth();
    const provider = new firebase.auth.GoogleAuthProvider();

    let currentUser = null;
    auth.onAuthStateChanged((user) => {
        if (user) {
            currentUser = user;
            document.getElementById('login-screen').style.display = 'none';
            document.getElementById('app-container').style.display = 'flex';
            loadLocalConfig();
            initApp();
        } else {
            currentUser = null;
            document.getElementById('login-screen').style.display = 'flex';
            document.getElementById('app-container').style.display = 'none';
        }
    });

    function loginFirebase() { auth.signInWithPopup(provider); }
    function logoutFirebase() { auth.signOut(); }
    function switchView(viewName) {
        document.querySelectorAll('.view-section').forEach(el => el.classList.remove('active'));
        document.querySelectorAll('.nav-tab-btn').forEach(el => el.classList.remove('active'));
        document.getElementById(`view-${viewName}`).classList.add('active');
        document.getElementById(`btn-tab-${viewName}`).classList.add('active');
    }
    const getLocalYMD = (date = new Date()) => `${date.getFullYear()}-${String(date.getMonth() + 1).padStart(2, '0')}-${String(date.getDate()).padStart(2, '0')}`;

    // ==========================================
    // 2. 本地設定隔離儲存
    // ==========================================
    function toggleConfigPanel() {
        const panel = document.getElementById('local-config');
        panel.style.display = (panel.style.display === 'grid') ? 'none' : 'grid';
    }
    function saveLocalConfig() {
        if(!currentUser) return;
        const config = {
            salary: parseFloat(document.getElementById('cfg-salary').value) || 0,
            subs: parseFloat(document.getElementById('cfg-subscriptions').value) || 0
        };
        localStorage.setItem(`local_hub_config_${currentUser.uid}`, JSON.stringify(config));
        executeAnalysis(); // 自動重新解析計算
    }
    function loadLocalConfig() {
        if(!currentUser) return;
        const raw = localStorage.getItem(`local_hub_config_${currentUser.uid}`);
        if(raw) {
            const config = JSON.parse(raw);
            document.getElementById('cfg-salary').value = config.salary;
            document.getElementById('cfg-subscriptions').value = config.subs;
        }
    }

    // ==========================================
    // 3. GA 核心高級數據分析模組
    // ==========================================
    let fullRecords = [];
    let chartInstances = {};
    let currentAnalysisMode = 'trend';

    function setDateRange(range, btnEl) {
        document.querySelectorAll('#date-btn-group .btn-filter').forEach(btn => btn.classList.remove('active'));
        btnEl.classList.add('active');
        const now = new Date();
        const customDiv = document.getElementById('custom-dates');
        const startInput = document.getElementById('custom-start');
        const endInput = document.getElementById('custom-end');
        customDiv.style.display = 'none';

        if (range === '7days') {
            endInput.value = getLocalYMD(now);
            startInput.value = getLocalYMD(new Date(now.setDate(now.getDate() - 6)));
        } else if (range === '30days') {
            endInput.value = getLocalYMD(now);
            startInput.value = getLocalYMD(new Date(now.setDate(now.getDate() - 29)));
        } else if (range === 'month') {
            startInput.value = getLocalYMD(now).substring(0, 7) + "-01";
            endInput.value = getLocalYMD(new Date(now.getFullYear(), now.getMonth() + 1, 0));
        } else if (range === 'custom') {
            customDiv.style.display = 'flex';
        }
    }

    function setAnalysisMode(mode, btnEl) {
        document.querySelectorAll('#mode-btn-group .btn-filter').forEach(btn => btn.classList.remove('active'));
        btnEl.classList.add('active');
        currentAnalysisMode = mode;
    }

    async function fetchDashboardData() {
        try {
            const snapshot = await db.collection("LifeApp_Records").where("uid", "==", currentUser.uid + "_life").get();
            fullRecords = [];
            snapshot.forEach(doc => fullRecords.push({ id: doc.id, ...doc.data() }));
            fullRecords.sort((a, b) => new Date(a.date) - new Date(b.date)); // 正序便於時間軸處理
            executeAnalysis();
        } catch (error) { alert("同步失敗"); }
    }

    function initApp() {
        setDateRange('month', document.querySelector('#date-btn-group .active'));
        fetchDashboardData();
        loadSandboxState();
    }

    function executeAnalysis() {
        if (!fullRecords.length) return;
        
        const startStr = document.getElementById('custom-start').value;
        const endStr = document.getElementById('custom-end').value;
        
        // 計算時間切片大小與模組 C（上一期）的邊界
        const currStart = new Date(startStr);
        const currEnd = new Date(endStr);
        const dayDiff = Math.ceil((currEnd - currStart) / (1000 * 60 * 60 * 24)) + 1;
        
        const prevEnd = new Date(currStart.getTime() - (1000 * 60 * 60 * 24));
        const prevStart = new Date(prevEnd.getTime() - ((dayDiff - 1) * 1000 * 60 * 60 * 24));
        const prevStartStr = getLocalYMD(prevStart);
        const prevEndStr = getLocalYMD(prevEnd);

        // 篩選當期與上期資料
        const currentSlice = fullRecords.filter(r => r.date >= startStr && r.date <= endStr);
        const previousSlice = fullRecords.filter(r => r.date >= prevStartStr && r.date <= prevEndStr);

        // 計算當期指標
        let currMetrics = { expense: 0, income: 0, growth: 0, food: 0, burn: 0 };
        const tbody = document.getElementById('table-body');
        tbody.innerHTML = '';

        currentSlice.forEach(r => {
            if (r.type === 'expense' || r.type === 'extra_expense') currMetrics.expense += r.amount;
            if (r.type === 'income' || r.type === 'extra_income') currMetrics.income += r.amount;
            if (r.type === 'learning' || r.type === 'habit') currMetrics.growth += r.amount;
            if (r.type === 'food') currMetrics.food += r.amount;
            if (r.type === 'exercise') currMetrics.burn += r.amount;

            // 渲染明細 (倒序排列，最新鮮的在上方)
            const tr = document.createElement('tr');
            tr.innerHTML = `<td>${r.date.substring(5)}</td><td><span class="badge" style="background:${getTypeColor(r.type)}">${r.type}</span></td><td>${r.categoryText || r.category}</td><td style="font-weight:bold;">${r.amount.toLocaleString()}</td><td style="color:#666; font-size:0.8rem;">${r.note||''}</td>`;
            tbody.insertBefore(tr, tbody.firstChild);
        });

        // 計算上期指標 (用於環比)
        let prevMetrics = { expense: 0, income: 0, growth: 0 };
        previousSlice.forEach(r => {
            if (r.type === 'expense' || r.type === 'extra_expense') prevMetrics.expense += r.amount;
            if (r.type === 'income' || r.type === 'extra_income') prevMetrics.income += r.amount;
            if (r.type === 'learning' || r.type === 'habit') prevMetrics.growth += r.amount;
        });

        // 讀取本地薪水與訂閱引數
        const baseSalary = parseFloat(document.getElementById('cfg-salary').value) || 0;
        const baseSubs = parseFloat(document.getElementById('cfg-subscriptions').value) || 0;
        
        // 精準可用結餘算式：(薪水+外部收入) - 實際花費 - 訂閱
        const realBalance = (baseSalary + currMetrics.income) - currMetrics.expense - baseSubs;

        // 更新 KPI 卡片
        document.getElementById('stat-expense').innerText = currMetrics.expense.toLocaleString();
        document.getElementById('stat-income').innerText = currMetrics.income.toLocaleString();
        document.getElementById('stat-balance').innerText = realBalance.toLocaleString();
        document.getElementById('stat-growth').innerText = currMetrics.growth;

        const calNet = currMetrics.burn - currMetrics.food;
        document.getElementById('stat-calorie').innerText = calNet > 0 ? `+${calNet}` : calNet;

        // 渲染模組 C 環比標籤
        renderComparisonBadge('cmp-expense', currMetrics.expense, prevMetrics.expense, true);
        renderComparisonBadge('cmp-income', currMetrics.income, prevMetrics.income, false);
        renderComparisonBadge('cmp-growth', currMetrics.growth, prevMetrics.growth, false);

        // 渲染模式
        if (currentAnalysisMode === 'trend') {
            renderTrendCharts(currentSlice, dayDiff, baseSalary);
        } else {
            renderStructureCharts(currentSlice);
        }
    }

    function renderComparisonBadge(elementId, curr, prev, isExpense = false) {
        const el = document.getElementById(elementId);
        if (prev === 0) { el.innerText = "較上期 --"; el.className = "comparison comp-neutral"; return; }
        const pct = ((curr - prev) / prev * 100).toFixed(1);
        
        if (curr > prev) {
            el.innerText = `較上期 +${pct}% ▲`;
            el.className = `comparison ${isExpense ? 'comp-up' : 'comp-down'}`;
        } else if (curr < prev) {
            el.innerText = `較上期 ${pct}% ▼`;
            el.className = `comparison ${isExpense ? 'comp-down' : 'comp-up'}`;
        } else {
            el.innerText = `較上期 持平`;
            el.className = "comparison comp-neutral";
        }
    }

    // ==========================================
    // 4. 高級視覺化引擎 (模組 A 與 模組 B)
    // ==========================================
    function renderTrendCharts(records, totalDays, baseSalary) {
        let dailyData = {};
        records.forEach(r => {
            if (!dailyData[r.date]) dailyData[r.date] = { expense: 0, health: 0, growth: 0 };
            if (r.type === 'expense' || r.type === 'extra_expense') dailyData[r.date].expense += r.amount;
            if (r.type === 'exercise') dailyData[r.date].health += r.amount;
            if (r.type === 'food') dailyData[r.date].health -= r.amount;
            if (r.type === 'learning' || r.type === 'habit') dailyData[r.date].growth += r.amount;
        });

        const sortedDates = Object.keys(dailyData).sort();
        
        // 模組 B: Pacing 理想消耗速率計算 (將可用預算平均分配至每一天)
        const dailyIdealBurn = baseSalary / totalDays;
        let accActualExpense = 0;
        let actualExpenseTimeline = [];
        let idealPacingTimeline = [];

        sortedDates.forEach((d, idx) => {
            accActualExpense += dailyData[d].expense;
            actualExpenseTimeline.push(accActualExpense);
            idealPacingTimeline.push(Math.round(dailyIdealBurn * (idx + 1)));
        });

        // 繪製財務 Pacing 複合對比圖
        const finCtx = document.getElementById('financeChart').getContext('2d');
        if (chartInstances['financeChart']) chartInstances['financeChart'].destroy();
        chartInstances['financeChart'] = new Chart(finCtx, {
            type: 'line',
            data: {
                labels: sortedDates,
                datasets: [
                    { label: '實際累積支出', data: actualExpenseTimeline, borderColor: '#dc3545', backgroundColor: 'rgba(220,53,69,0.05)', fill: true, tension: 0.2 },
                    { label: '理想預算消耗控制線 (Pacing)', data: idealPacingTimeline, borderColor: '#6c757d', borderDash: [5, 5], pointRadius: 0, fill: false }
                ]
            },
            options: { responsive: true, maintainAspectRatio: false, plugins: { title: { display: true, text: '📈 支出與 Pacing 預算斜率對比' } } }
        });

        // 繪製其餘趨勢圖
        drawChart('healthChart', 'line', '單日熱量赤字/盈餘波動', sortedDates, sortedDates.map(d => dailyData[d].health), '#28a745');
        let accG = 0;
        drawChart('growthChart', 'line', '成長路徑累積曲線', sortedDates, sortedDates.map(d => { accG += dailyData[d].growth; return accG; }), '#17a2b8');
    }

    function renderStructureCharts(records) {
        // 模組 A: 分類涵攝結構收斂
        let expCats = {}, foodCats = {}, grwCats = {};
        
        records.forEach(r => {
            const cat = r.categoryText || r.category || '未分類';
            if (r.type === 'expense' || r.type === 'extra_expense') expCats[cat] = (expCats[cat] || 0) + r.amount;
            if (r.type === 'food') foodCats[cat] = (foodCats[cat] || 0) + r.amount;
            if (r.type === 'learning' || r.type === 'habit') grwCats[cat] = (grwCats[cat] || 0) + r.amount;
        });

        const parseObj = (obj) => {
            const sorted = Object.entries(obj).sort((a,b) => b[1] - a[1]);
            return { labels: sorted.map(x => x[0]), data: sorted.map(x => x[1]) };
        };

        const fData = parseObj(expCats);
        const hData = parseObj(foodCats);
        const gData = parseObj(grwCats);

        drawChart('financeChart', 'doughnut', '支出結構佔比 (Where the money went)', fData.labels, fData.data, ['#dc3545', '#ffc107', '#fd7e14', '#e83e8c', '#6f42c1', '#6c757d']);
        drawChart('healthChart', 'doughnut', '攝取食物結構分佈', hData.labels, hData.data, ['#fd7e14', '#ffc107', '#20c997', '#6c757d']);
        drawChart('growthChart', 'bar', '習慣與學習項目權重', gData.labels, gData.data, '#17a2b8');
    }

    function drawChart(id, type, label, labels, data, colors) {
        const ctx = document.getElementById(id).getContext('2d');
        if (chartInstances[id]) chartInstances[id].destroy();
        const isDoughnut = type === 'doughnut';
        
        chartInstances[id] = new Chart(ctx, {
            type: type,
            data: {
                labels: labels.length ? labels : ['無資料'],
                datasets: [{
                    label: label, data: data.length ? data : [0],
                    backgroundColor: isDoughnut ? colors : (Array.isArray(colors) ? colors[0] : colors + '22'),
                    borderColor: isDoughnut ? '#fff' : colors, borderWidth: 1.5, fill: type === 'line', tension: 0.2
                }]
            },
            options: { responsive: true, maintainAspectRatio: false, plugins: { title: { display: true, text: label }, legend: { display: isDoughnut, position: 'right' } } }
        });
    }

    function getTypeColor(t) { return (t==='expense'||t==='extra_expense')?'#dc3545':(t==='income'||t==='extra_income')?'#28a745':(t==='food')?'#fd7e14':(t==='exercise')?'#20c997':'#17a2b8'; }

    // ==========================================
    // 5. 心流沙盒模組 (完全保留且物理隔離)
    // ==========================================
    let sandboxState = { tasks: [], activeId: null, globalNote: "", timer: { mode: 'FLEX', seconds: 0, status: 'IDLE', intervalId: null } };
    function getSandboxKey() { return currentUser ? `flow_sandbox_pro_${currentUser.uid}` : 'flow_sandbox_pro_temp'; }

    function loadSandboxState() {
        const raw = localStorage.getItem(getSandboxKey());
        if (raw) {
            try {
                const data = JSON.parse(raw);
                sandboxState.tasks = data.tasks || [];
                sandboxState.activeId = data.activeId || null;
                sandboxState.globalNote = data.globalNote || "";
            } catch (e) {}
        }
        renderSandboxTasks(); refreshSandboxNoteArea();
    }

    function saveSandboxState() {
        if (!currentUser) return;
        const noteArea = document.getElementById('sandbox-note-area');
        if (sandboxState.activeId) {
            const t = sandboxState.tasks.find(x => x.id === sandboxState.activeId);
            if(t) t.note = noteArea.value;
        } else { sandboxState.globalNote = noteArea.value; }

        localStorage.setItem(getSandboxKey(), JSON.stringify({ tasks: sandboxState.tasks, activeId: sandboxState.activeId, globalNote: sandboxState.globalNote }));
        document.getElementById('sandbox-save-status').innerText = `已儲存 ${new Date().toLocaleTimeString('zh-TW', {hour12:false})}`;
    }

    function importWhiteboardTasks() {
        if(!currentUser) return;
        const wbRaw = localStorage.getItem(`whiteboard_state_${currentUser.uid}`);
        if(!wbRaw) return alert("找不到白板資料！");
        
        const wbData = JSON.parse(wbRaw);
        let count = 0;
        if (wbData.workspaces) {
            Object.values(wbData.workspaces).forEach(cards => {
                cards.forEach(c => {
                    if (c.status === 2 || sandboxState.tasks.some(t => t.wbId === c.id)) return;
                    sandboxState.tasks.push({ id: Date.now() + Math.random(), wbId: c.id, title: c.title || '未命名', note: c.content || '', completed: false });
                    count++;
                });
            });
        }
        if(count > 0) { alert(`已安全複製 ${count} 筆任務進沙盒緩衝區。`); saveSandboxState(); renderSandboxTasks(); }
    }

    function renderSandboxTasks() {
        const list = document.getElementById('sandbox-task-list');
        list.innerHTML = "";
        sandboxState.tasks.forEach(t => {
            const div = document.createElement('div');
            div.className = `task-item ${sandboxState.activeId === t.id ? 'active' : ''}`;
            div.innerHTML = `
                <div style="display:flex; align-items:center; gap:8px; width:100%;">
                    <input type="checkbox" ${t.completed ? 'checked' : ''} onchange="toggleSandboxTask(${t.id}, event)">
                    <div onclick="setSandboxActiveTask(${t.id})" style="flex-grow:1; font-weight:bold; ${t.completed?'text-decoration:line-through;opacity:0.5;':''}">${t.title}</div>
                </div>
            `;
            list.appendChild(div);
        });
    }

    function toggleSandboxTask(id, e) { e.stopPropagation(); const t = sandboxState.tasks.find(x => x.id === id); if(t) t.completed = !t.completed; saveSandboxState(); renderSandboxTasks(); }
    function setSandboxActiveTask(id) { sandboxState.activeId = id; saveSandboxState(); renderSandboxTasks(); refreshSandboxNoteArea(); }

    function refreshSandboxNoteArea() {
        const titleEl = document.getElementById('sandbox-task-title');
        const areaEl = document.getElementById('sandbox-note-area');
        if (sandboxState.activeId) {
            const t = sandboxState.tasks.find(x => x.id === sandboxState.activeId);
            if(t) { titleEl.value = `🎯 ${t.title}`; areaEl.value = t.note || ""; return; }
        }
        titleEl.value = "全域發想草稿筆記"; areaEl.value = sandboxState.globalNote || "";
    }

    // Timer Engine
    function setTimerMode(m) { stopTimer(); sandboxState.timer.mode = m; sandboxState.timer.seconds = m==='POMO'?25*60:0; updateTimerDisplay(); }
    function startTimer() {
        if(sandboxState.timer.status === 'RUNNING') return;
        sandboxState.timer.status = 'RUNNING'; document.getElementById('timerStatus').innerText = '🔥 心流高能運算中';
        sandboxState.timer.intervalId = setInterval(() => {
            if(sandboxState.timer.mode === 'FLEX') sandboxState.timer.seconds++;
            else { sandboxState.timer.seconds--; if(sandboxState.timer.seconds<=0) { stopTimer(); alert('🍅 番茄鐘時間到，請休息一下！'); } }
            updateTimerDisplay();
        }, 1000);
    }
    function pauseTimer() { clearInterval(sandboxState.timer.intervalId); sandboxState.timer.status = 'PAUSED'; document.getElementById('timerStatus').innerText = '⏸️ 暫停'; }
    function stopTimer() { clearInterval(sandboxState.timer.intervalId); sandboxState.timer.status = 'IDLE'; document.getElementById('timerStatus').innerText = '閒置'; updateTimerDisplay(); }
    function updateTimerDisplay() { const s = sandboxState.timer.seconds; document.getElementById('timeDisplay').innerText = `${Math.floor(s/60).toString().padStart(2,'0')}:${(s%60).toString().padStart(2,'0')}`; }

    function clearSandbox() { if(confirm("確定清空沙盒緩衝區？此動作不會影響到雲端白板，但本地草稿將消失。")) { stopTimer(); localStorage.removeItem(getSandboxKey()); location.reload(); } }
    function exportSandboxMarkdown() {
        let text = `# 🌟 心流沙盒最終收割戰報\n\n`;
        if (sandboxState.globalNote.trim()) text += `## 📝 全域沙盒靈感\n${sandboxState.globalNote}\n\n`;
        sandboxState.tasks.forEach(t => { text += `### ${t.completed ? '[x]' : '[ ]'} ${t.title}\n${t.note}\n\n`; });
        const blob = new Blob([text], { type: 'text/markdown;charset=utf-8' });
        const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = `OpsHub_Sandbox_${getLocalYMD()}.md`;
        document.body.appendChild(a); a.click(); document.body.removeChild(a);
    }
</script>
